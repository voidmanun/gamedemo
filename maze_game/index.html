<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>乐乐的游戏</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="startScreen">
        <div class="panel">
            <h1>迷宫逃生</h1>
            <p>按住并拖动小蓝点，沿着白色道路前往黄色终点区域。<br><br><span class="highlight-red">⚠ 碰到红色边缘就会死！</span></p>
            <button class="start-btn">开始挑战</button>
        </div>
    </div>

    <div class="overlay" id="gameOverScreen" style="display:none;">
        <div class="panel">
            <h1 class="danger">Game Over</h1>
            <p>你未能逃离迷宫！</p>
            <button class="restart-btn">重新开始</button>
        </div>
    </div>

    <div class="overlay" id="winScreen" style="display:none;">
        <div class="panel">
            <h1 class="success">You Win!</h1>
            <p>恭喜你成功到达终点！</p>
            <button class="restart-btn">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
